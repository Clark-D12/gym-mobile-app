<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abs Rookie – Fit Buddy</title>
  <link rel="stylesheet" href="../css/workout.css">
</head>

<body>
<div class="app">

  <!-- BANNER -->
  <div class="workout-header">
    <img src="../img/abs-rookie.jpg" alt="Abs Rookie" class="workout-banner">
  </div>

  <!-- CONTENT -->
  <div id="workout-content">

    <h1>Abs Rookie</h1>

    <div class="workout-stats">
      <div class="stat-box">
        <h3>10 mins</h3>
        <p>Durations</p>
      </div>
      <div class="stat-box">
        <h3>5</h3>
        <p>Exercises</p>
      </div>
    </div>

    <h2>Exercises</h2>

    <!-- scrollable exercise list — touch/swipe to scroll -->
    <div class="exercise-list" id="exerciseList">
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/jumping jack.mp4" type="video/mp4">
        </video>
        <div>
          <p>Jumping Jacks</p>
          <span>00:30</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/push-up.mp4" type="video/mp4">
        </video>
        <div>
          <p>Push Ups</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/sit up.mp4" type="video/mp4">
        </video>
        <div>
          <p>Sit Ups</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Decline Reverse Crunch.mp4" type="video/mp4">
        </video>
        <div>
          <p>Decline Reverse Crunch</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Reverse Crunch on the Bench.mp4" type="video/mp4">
        </video>
        <div>
          <p>Reverse Crunch on Bench</p>
          <span>x12</span>
        </div>
      </div>

    </div>

    <div class="action-row">
      <button class="back-button" onclick="history.back()">Cancel</button>
      <button class="start-btn">START</button>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/workout.js"></script>
</body>
</html>
