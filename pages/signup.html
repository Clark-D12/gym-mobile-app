<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="../css/signup.css">
</head>

<body>
  <div class="container">
    <div class="form">
      
      <form id="signup-form">

        <!-- STEP 1 -->
        <div id="form-step-1" class="form-step">

          <input type="email" placeholder="Email" id="email" required>
          <input type="text" placeholder="Username" id="username" required>

          <div class="password">

            <div class="pwd-wrapper">
              <input type="password" placeholder="Password" id="password" minlength="6" required>
              <button type="button" class="toggle-icon" data-target="password">
                <img src="../img/eye-slash-solid-full.svg" alt="toggle password">
              </button>
            </div>

            <div class="pwd-wrapper">
              <input type="password" placeholder="Confirm Password" id="Confirmpassword" minlength="6" required>
              <button type="button" class="toggle-icon" data-target="Confirmpassword">
                <img src="../img/eye-slash-solid-full.svg" alt="toggle password">
              </button>
            </div>

            <div id="password-error" class="error hidden">
              Password does not match
            </div>

            <div class="nextbutton">
              <button type="button" id="nextbtn">NEXT</button>
            </div>

          </div>

          <div class="paragraph">
            <p>Already have an account? <a href="../gym.html">Login</a></p>
          </div>
        </div>

        <!-- STEP 2 -->
        <div id="form-step-2" class="form-step hidden">

          <input type="number" placeholder="Age" id="age" min="1" max="150" required>

          <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>

          <input type="text" placeholder="Height (cm)" id="height" required>
          <input type="text" placeholder="Weight (kg)" id="weight" required>

          <div class="nextbutton">
            <button type="button" id="backbtn">BACK</button>
            <!-- submit button -->
            <button type="submit" id="submitbtn">CREATE ACCOUNT</button>
          </div>

          <div class="paragraph">
            <p>Already have an account? <a href="../gym.html">Login</a></p>
          </div>

        </div>

      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/signup.js"></script>
</body>
</html>
