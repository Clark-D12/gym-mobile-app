<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chest Rookie – Fit Buddy</title>
  <link rel="stylesheet" href="../css/workout.css">
</head>

<body>
<div class="app">

  <!-- BANNER -->
  <div class="workout-header">
    <img src="../img/chest rookie.png" alt="Chest Rookie" class="workout-banner">
  </div>

  <!-- CONTENT -->
  <div id="workout-content">

    <h1>Chest Rookie</h1>

    <div class="workout-stats">
      <div class="stat-box">
        <h3>10 mins</h3>
        <p>Durations</p>
      </div>
      <div class="stat-box">
        <h3>5</h3>
        <p>Exercises</p>
      </div>
    </div>

    <h2>Exercises</h2>

    <!-- scrollable exercise list — touch/swipe to scroll -->
    <div class="exercise-list" id="exerciseList">
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/jumping jack.mp4" type="video/mp4">
        </video>
        <div>
          <p>Jumping Jacks</p>
          <span>00:30</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/incline push up.mp4" type="video/mp4">
        </video>
        <div>
          <p>Incline Push-up</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Band Bench Press.mp4" type="video/mp4">
        </video>
        <div>
          <p>Band Bench Press</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Band Chest Press.mp4" type="video/mp4">
        </video>
        <div>
          <p>Band Chest Press</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/incline push up.mp4" type="video/mp4">
        </video>
        <div>
          <p>Incline Push-up</p>
          <span>x12</span>
        </div>
      </div>

    </div>

    <div class="action-row">
      <button class="back-button" onclick="history.back()">Cancel</button>
      <button class="start-btn">START</button>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/workout.js"></script>
</body>
</html>
