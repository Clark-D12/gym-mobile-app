<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Back &amp; Shoulder Rookie – Fit Buddy</title>
  <link rel="stylesheet" href="../css/workout.css">
</head>

<body>
<div class="app">

  <!-- BANNER -->
  <div class="workout-header">
    <img src="../img/bs rookie.jpg" alt="Back &amp; Shoulder Rookie" class="workout-banner">
  </div>

  <!-- CONTENT -->
  <div id="workout-content">

    <h1>Back &amp; Shoulder Rookie</h1>

    <div class="workout-stats">
      <div class="stat-box">
        <h3>10 mins</h3>
        <p>Durations</p>
      </div>
      <div class="stat-box">
        <h3>5</h3>
        <p>Exercises</p>
      </div>
    </div>

    <h2>Exercises</h2>

    <!-- scrollable exercise list — touch/swipe to scroll -->
    <div class="exercise-list" id="exerciseList">
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Side Bend Stretching.mp4" type="video/mp4">
        </video>
        <div>
          <p>Side Bend Stretching</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Rolling Lat and Rear Deltoid Exercise.mp4" type="video/mp4">
        </video>
        <div>
          <p>Rolling Lat &amp; Rear Deltoid</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Lying Back Extension Exercise.mp4" type="video/mp4">
        </video>
        <div>
          <p>Lying Back Extension</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Plank Shoulder Tap Exercise.mp4" type="video/mp4">
        </video>
        <div>
          <p>Plank Shoulder Tap</p>
          <span>x12</span>
        </div>
      </div>
      <div class="exercise-item">
        <video class="exercise-video" autoplay loop muted playsinline>
          <source src="../img/Band External Shoulder Rotation Exercise for Rotator Cuff.mp4" type="video/mp4">
        </video>
        <div>
          <p>Band External Shoulder Rotation</p>
          <span>x12</span>
        </div>
      </div>

    </div>

    <div class="action-row">
      <button class="back-button" onclick="history.back()">Cancel</button>
      <button class="start-btn">START</button>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/workout.js"></script>
</body>
</html>
