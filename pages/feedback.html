<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback – Fit Buddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/support.css">
  <link rel="stylesheet" href="../css/nav.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="phone">

    <!-- PAGE HEADER -->
    <header class="page-header">
      <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="header-icon sky">
        <img src="../img/feedback.png" alt="">
      </div>
      <h1>Feedback</h1>
      <p>Help us make Fit Buddy better</p>
    </header>

    <!-- CATEGORY CARD -->
    <div class="support-card">
      <label class="field-label">What's your feedback about?</label>
      <div class="category-grid">
        <button class="cat-chip" data-cat="Bug" onclick="selectCategory(this)">🐛 Bug Report</button>
        <button class="cat-chip" data-cat="Feature" onclick="selectCategory(this)">💡 Feature Request</button>
        <button class="cat-chip" data-cat="UI" onclick="selectCategory(this)">🎨 UI / Design</button>
        <button class="cat-chip" data-cat="Performance" onclick="selectCategory(this)">⚡ Performance</button>
        <button class="cat-chip" data-cat="Content" onclick="selectCategory(this)">🏋️ Workout Content</button>
        <button class="cat-chip" data-cat="Other" onclick="selectCategory(this)">💬 Other</button>
      </div>
    </div>

    <!-- FEEDBACK FORM CARD -->
    <div class="support-card">
      <label class="field-label" for="feedbackTitle">Title</label>
      <input
        type="text"
        id="feedbackTitle"
        class="support-input"
        placeholder="Short summary of your feedback"
        maxlength="100"
      >

      <label class="field-label" for="feedbackBody" style="margin-top:16px;">Description</label>
      <textarea
        id="feedbackBody"
        class="support-textarea"
        placeholder="Describe your feedback in detail. The more you share, the better we can help!"
        rows="5"
        maxlength="1000"
      ></textarea>
      <div class="char-count"><span id="charCount">0</span> / 1000</div>

      <button class="submit-btn" onclick="submitFeedback()">
        Send Feedback
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <!-- THANK YOU CARD -->
    <div class="support-card thankyou-card" id="thankyouCard" style="display:none;">
      <div class="thankyou-icon">📬</div>
      <h3>Feedback sent!</h3>
      <p>Thanks for taking the time to share your thoughts. We read every single message and use it to improve Fit Buddy.</p>
      <button class="submit-btn" onclick="history.back()">Back to Account</button>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="homepage.html" class="nav-item" data-page="training">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4M6 9h12M6 15h12"/>
      </svg>
      <span class="nav-label">Training</span>
    </a>
    <a href="report.html" class="nav-item" data-page="reports">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M8 17v-5M12 17V8M16 17v-3"/>
      </svg>
      <span class="nav-label">Reports</span>
    </a>
    <a href="profile.html" class="nav-item active" data-page="account">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span class="nav-label">Account</span>
    </a>
  </nav>

  <script>
    const SUPA_URL = "https://sgsncmwrepgpohzmvxfd.supabase.co";
    const SUPA_KEY = "sb_publishable_YyRwaDLOiB6XGew3JEDqrA_oFFSkeM8";
    const gym = window.supabase.createClient(SUPA_URL, SUPA_KEY);

    let selectedCategory = '';

    function selectCategory(btn) {
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      selectedCategory = btn.dataset.cat;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const textarea = document.getElementById('feedbackBody');
      if (textarea) {
        textarea.addEventListener('input', () => {
          document.getElementById('charCount').textContent = textarea.value.length;
        });
      }
    });

    async function submitFeedback() {
      const title = document.getElementById('feedbackTitle').value.trim();
      const body  = document.getElementById('feedbackBody').value.trim();

      if (!title) { showToast('Please add a title.', true); return; }
      if (!body)  { showToast('Please describe your feedback.', true); return; }

      const submitBtn = document.querySelector('.submit-btn');
      submitBtn.textContent = 'Sending…';
      submitBtn.disabled    = true;

      try {
        // Auth check
        const { data: { session } } = await gym.auth.getSession();
        if (!session) {
          window.location.href = '../gym.html';
          return;
        }

        const { error } = await gym
          .from('feedback')
          .insert({
            user_id:  session.user.id,
            category: selectedCategory || 'General',
            title:    title,
            body:     body
          });

        if (error) throw error;

        // Show thank you
        document.querySelectorAll('.support-card:not(#thankyouCard)').forEach(c => c.style.display = 'none');
        document.getElementById('thankyouCard').style.display = 'block';

      } catch (err) {
        console.error('Feedback save error:', err);
        showToast('Failed to send. Please try again.', true);
      } finally {
        submitBtn.textContent = 'Send Feedback';
        submitBtn.disabled    = false;
      }
    }

    function showToast(msg, isError) {
      const existing = document.querySelector('.s-toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 's-toast' + (isError ? ' error' : '');
      toast.textContent = msg;
      document.body.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
    }
  </script>

</body>
</html>
